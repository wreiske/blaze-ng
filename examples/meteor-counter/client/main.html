<head>
  <title>Blaze-NG Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
</head>

<body>
  <div id="app">{{> counter}}</div>
</body>

<template name="counter">
  <div class="counter">
    <h1>{{count}}</h1>
    <div class="buttons">
      <button class="decrement" disabled="{{isZero}}">&minus;</button>
      <button class="reset">Reset</button>
      <button class="increment">+</button>
    </div>
    <p class="label">
      {{#if isZero}} Click + to start counting {{else}} Clicked {{count}} {{pluralize count "time"
      "times"}} {{/if}}
    </p>
  </div>
</template>
